<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preflop Range</title>
<style>
body{margin:0;padding:10px;font-family:Arial,sans-serif;background:#fff;}
h3{font-size:14px;margin:0 0 10px;color:#222;}
.row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.btn{padding:7px 10px;font-size:12px;font-weight:bold;border:2px solid #999;border-radius:6px;background:#eee;color:#333;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.btn:active{opacity:0.7;}
.btn.pos-on{background:#1565C0;color:#fff;border-color:#1565C0;}
.btn.open-on{background:#1565C0;color:#fff;border-color:#1565C0;}
.btn.call-on{background:#E65100;color:#fff;border-color:#E65100;}
.btn.bet3-on{background:#2E7D32;color:#fff;border-color:#2E7D32;}
#note{font-size:11px;color:#666;margin-bottom:8px;min-height:14px;}
.tbl{overflow-x:auto;margin-bottom:10px;}
table{border-collapse:collapse;}
td{width:25px;height:25px;font-size:9px;font-weight:bold;text-align:center;vertical-align:middle;border:1px solid #ddd;color:#bbb;background:#f5f5f5;}
td.on-o{background:#1565C0;color:#fff;border-color:#1565C0;}
td.on-c{background:#E65100;color:#fff;border-color:#E65100;}
td.on-b{background:#2E7D32;color:#fff;border-color:#2E7D32;}
.leg{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;}
.leg-dot{width:12px;height:12px;border-radius:3px;}
hr{border:none;border-top:1px solid #ddd;margin:14px 0;}
.label{font-size:12px;color:#555;margin-bottom:4px;}
input,select{width:100%;padding:8px;font-size:14px;border:2px solid #ccc;border-radius:6px;margin-bottom:10px;box-sizing:border-box;}
.calc-btn{width:100%;padding:10px;font-size:14px;font-weight:bold;background:#1565C0;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.res{margin-top:12px;padding:12px;border-radius:8px;border:2px solid #ccc;display:none;}
.res-num{font-size:28px;font-weight:bold;}
.res-label{font-size:12px;color:#666;margin-bottom:2px;}
.verdict{margin-top:10px;padding:8px 12px;border-radius:6px;font-size:13px;font-weight:bold;}
.v-good{background:#E8F5E9;color:#1B5E20;}
.v-close{background:#FFF8E1;color:#6D4C00;}
.v-bad{background:#FFEBEE;color:#B71C1C;}
.hint{font-size:11px;color:#777;margin-top:6px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chip{padding:5px 10px;font-size:11px;font-weight:bold;border:2px solid #aaa;border-radius:20px;background:#f0f0f0;color:#444;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.chip.chip-on{background:#1565C0;color:#fff;border-color:#1565C0;}
</style>
</head>
<body>
<h3>Preflop Range βÄî Full Ring</h3>
<div class="row" id="posRow"></div>
<div class="row" id="actRow"></div>
<div id="note"></div>
<div class="tbl"><table id="grid"></table></div>
<div class="leg">
  <div class="leg-item"><div class="leg-dot" style="background:#1565C0"></div>Open</div>
  <div class="leg-item"><div class="leg-dot" style="background:#E65100"></div>Call</div>
  <div class="leg-item"><div class="leg-dot" style="background:#2E7D32"></div>3-bet</div>
</div>
<hr>
<h3>TΟ≠nh Equity & Pot Odds</h3>
<div class="label">Street</div>
<select id="street">
  <option value="4">Flop (Ο½4)</option>
  <option value="2">Turn (Ο½2)</option>
</select>
<div class="label">LoαΚΓi draw</div>
<div class="chips" id="chips"></div>
<div class="label">SαΜë outs (tαΜ± nhαΚ≠p)</div>
<input type="number" id="outsInp" placeholder="vd: 9" min="1" max="20">
<div class="label">Pot hiαΜ΅n tαΚΓi (k)</div>
<input type="number" id="potInp" placeholder="vd: 200">
<div class="label">ΡêαΜëi thαΜß bet (k)</div>
<input type="number" id="betInp" placeholder="vd: 100">
<button class="calc-btn" onclick="doCalc()">TΟçNH EV</button>
<div class="res" id="res">
  <div class="res-label">Equity cαΜßa bαΚΓn</div>
  <div class="res-num" id="eqShow" style="color:#1565C0"></div>
  <div class="res-label" style="margin-top:8px;">Pot odds cαΚßn</div>
  <div class="res-num" id="odShow" style="color:#555"></div>
  <div class="verdict" id="verd"></div>
  <div class="hint" id="hintShow"></div>
</div>
<script>
var RANKS=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
var DATA={
  'UTG':{o:['AA','KK','QQ','JJ','TT','99','88','77','AKs','AQs','AJs','ATs','AKo','AQo','AJo','KQs','KJs','KTs','KQo','QJs','QTs','JTs','T9s'],c:['QQ','JJ','AKs','AKo'],b:['AA','KK'],n:'UTG: ChαΚΖt nhαΚΞt βÄî khoαΚΘng 15% tay.'},
  'UTG+1':{o:['AA','KK','QQ','JJ','TT','99','88','77','66','AKs','AQs','AJs','ATs','AKo','AQo','AJo','ATo','KQs','KJs','KTs','KQo','KJo','QJs','QTs','JTs','J9s','T9s','T8s'],c:['QQ','JJ','TT','AKs','AQs','AKo'],b:['AA','KK'],n:'UTG+1: MαΜü thΟΣm chΟΚt so vαΜ¦i UTG.'},
  'MP':{o:['AA','KK','QQ','JJ','TT','99','88','77','66','55','AKs','AQs','AJs','ATs','A9s','A8s','AKo','AQo','AJo','ATo','KQs','KJs','KTs','KQo','QJs','QTs','JTs','J8s','T9s','T8s','98s'],c:['TT','99','88','77','AQs','AJs','AQo','KQs'],b:['AA','KK','QQ','AKs','AKo'],n:'MP: Middle position βÄî range trung bΟ§nh.'},
  'HJ':{o:['AA','KK','QQ','JJ','TT','99','88','77','66','55','44','AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','AKo','AQo','AJo','ATo','KQs','KJs','KTs','K9s','KQo','QJs','QTs','Q9s','JTs','J9s','T9s','T8s','T7s','98s','97s','87s'],c:['TT','99','88','77','66','AJs','ATs','AJo','KQs','KJs','QJs'],b:['AA','KK','QQ','JJ','AKs','AQs','AKo'],n:'HJ: Hijack βÄî bαΚ·t ΡëαΚßu mαΜü rαΜông range.'},
  'CO':{o:['AA','KK','QQ','JJ','TT','99','88','77','66','55','44','33','AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s','AKo','AQo','AJo','ATo','KQs','KJs','KTs','K9s','K8s','K7s','K6s','KQo','KJo','QJs','QTs','Q9s','Q8s','JTs','J9s','J8s','T9s','T8s','98s','97s','87s','86s','76s','65s'],c:['99','88','77','66','55','ATs','A9s','ATo','KJs','KTs','QJs','QTs','JTs'],b:['AA','KK','QQ','JJ','TT','AKs','AQs','AJs','AKo','AQo'],n:'CO: Cutoff βÄî gαΚßn BTN, range khΟΓ rαΜông.'},
  'BTN':{o:['AA','KK','QQ','JJ','TT','99','88','77','66','55','44','33','22','AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s','AKo','AQo','AJo','ATo','A9o','A8o','KQs','KJs','KTs','K9s','K8s','K7s','K6s','K5s','K4s','K3s','K2s','KQo','KJo','KTo','QJs','QTs','Q9s','Q8s','Q7s','Q6s','QTo','JTs','J9s','J8s','J7s','JTo','T9s','T8s','T7s','98s','97s','87s','86s','76s','75s','65s','64s','54s'],c:['88','77','66','55','44','33','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s','A9o','A8o','KTo','QTo','JTo','T9s','98s','87s'],b:['AA','KK','QQ','JJ','TT','99','AKs','AQs','AJs','ATs','AKo','ATo','KQs'],n:'BTN: Button βÄî vαΜ΄ trΟ≠ tαΜët nhαΚΞt, range rαΜông nhαΚΞt.'},
  'SB':{o:['AA','KK','QQ','JJ','TT','99','88','77','66','55','44','33','AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','AKo','AQo','AJo','ATo','KQs','KJs','KTs','K9s','KQo','QJs','QTs','Q9s','JTs','J9s','T9s','T8s','98s','87s','76s','65s'],c:[],b:['AA','KK','QQ','JJ','TT','AKs','AQs','AJs','AKo','AQo','A5s','A4s','K5s'],n:'SB: KhΟ¥ng nΟΣn call βÄî OOP bαΚΞt lαΜΘi. 3-bet hoαΚΖc fold.'},
  'BB':{o:[],c:['AA','KK','QQ','JJ','TT','99','88','77','66','55','44','33','22','AKs','AQs','AJs','ATs','A9s','A8s','A7s','A6s','A5s','A4s','A3s','A2s','AKo','AQo','AJo','ATo','A9o','A8o','A7o','A6o','A5o','KQs','KJs','KTs','K9s','K8s','K7s','K6s','K5s','KQo','KJo','KTo','K9o','QJs','QTs','Q9s','Q8s','Q7s','QJo','QTo','Q9o','JTs','J9s','J8s','J7s','JTo','J9o','T9s','T8s','T7s','T9o','98s','97s','96s','87s','86s','85s','76s','75s','65s','64s','54s','53s'],b:['AA','KK','QQ','JJ','TT','AKs','AQs','AKo','A3s','A2s','K4s','76s'],n:'BB: Defend rαΜông βÄî ΡëΟΘ bαΜè tiαΜ¹n, pot odds tαΜët nhαΚΞt.'}
};
var POSITIONS=['UTG','UTG+1','MP','HJ','CO','BTN','SB','BB'];
var curPos='UTG',curAct='o';
function getKey(i,j){if(i===j)return RANKS[i]+RANKS[j];if(i<j)return RANKS[i]+RANKS[j]+'s';return RANKS[j]+RANKS[i]+'o';}
function renderAll(){
  var ph='';for(var i=0;i<POSITIONS.length;i++){var p=POSITIONS[i];ph+='<button class="btn'+(p===curPos?' pos-on':'')+'" onclick="setPos(\''+p+'\')">'+p+'</button>';}
  document.getElementById('posRow').innerHTML=ph;
  var acts=[['o','Open','open-on'],['c','Call','call-on'],['b','3-bet','bet3-on']];var ah='';
  for(var j=0;j<acts.length;j++){var a=acts[j];ah+='<button class="btn'+(curAct===a[0]?' '+a[2]:'')+'" onclick="setAct(\''+a[0]+'\')">'+a[1]+'</button>';}
  document.getElementById('actRow').innerHTML=ah;
  document.getElementById('note').textContent=DATA[curPos].n||'';
  var d=DATA[curPos],arr=curAct==='o'?d.o:curAct==='c'?d.c:d.b,set={};
  for(var k=0;k<arr.length;k++)set[arr[k]]=true;
  var cls=curAct==='o'?'on-o':curAct==='c'?'on-c':'on-b',rows='';
  for(var r=0;r<13;r++){rows+='<tr>';for(var c=0;c<13;c++){var key=getKey(r,c);rows+='<td class="'+(set[key]?cls:'')+'">'+key+'</td>';}rows+='</tr>';}
  document.getElementById('grid').innerHTML=rows;
}
window.setPos=function(p){curPos=p;renderAll();}
window.setAct=function(a){curAct=a;renderAll();}
renderAll();
var PRESETS=[{n:'Flush draw',o:9},{n:'Straight 2 ΡëαΚßu',o:8},{n:'SetβÜ£Full',o:7},{n:'Overcards',o:6},{n:'Gutshot',o:4},{n:'PairβÜ£Set',o:2}];
var selOut=null;
function renderChips(){var h='';for(var i=0;i<PRESETS.length;i++){var p=PRESETS[i];h+='<div class="chip'+(selOut===p.o?' chip-on':'')+'" onclick="pickChip('+p.o+')">'+p.n+' ('+p.o+')</div>';}document.getElementById('chips').innerHTML=h;}
window.pickChip=function(o){selOut=o;document.getElementById('outsInp').value=o;renderChips();}
renderChips();
window.doCalc=function(){
  var outs=parseInt(document.getElementById('outsInp').value)||0;
  var pot=parseFloat(document.getElementById('potInp').value)||0;
  var bet=parseFloat(document.getElementById('betInp').value)||0;
  var mult=parseInt(document.getElementById('street').value);
  if(outs<1||pot<=0||bet<=0){alert('NhαΚ≠p ΡëαΜß outs, pot vΟ† bet nhΟ©!');return;}
  var eq=Math.min(outs*mult,100),odds=Math.round(bet/(pot+bet)*100),diff=eq-odds;
  document.getElementById('eqShow').textContent=eq+'%';
  document.getElementById('odShow').textContent=odds+'%';
  var verd=document.getElementById('verd'),hint=document.getElementById('hintShow');
  if(diff>5){verd.className='verdict v-good';verd.textContent='β€™ NΟäN CALL βÄî Equity hΤΓn pot odds +'+diff+'%';hint.textContent='EV dΤΑΤΓng rΟΒ. Call tαΜ± tin.';}
  else if(diff>=0){verd.className='verdict v-close';verd.textContent='~ SΟ¹T NΟöT βÄî HΤΓn chαΜâ +'+diff+'%';hint.textContent='Call ΡëΤΑαΜΘc nhΤΑng cαΚßn implied odds tαΜët.';}
  else if(diff>=-8){verd.className='verdict v-close';verd.textContent='~ CΟ²N NHαΚ°C βÄî KΟ©m '+Math.abs(diff)+'%';hint.textContent='Fold an toΟ†n hΤΓn trαΜΪ khi implied odds rαΚΞt tαΜët.';}
  else{verd.className='verdict v-bad';verd.textContent='β€½ NΟäN FOLD βÄî KΟ©m pot odds '+Math.abs(diff)+'%';hint.textContent='EV ΟΔm rΟΒ rΟ†ng. Fold.';}
  document.getElementById('res').style.display='block';
}
</script>
</body>
</html>
